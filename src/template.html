<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battleship</title>
  </head>
  <body>
    <div class="container">
      <h1>Battleship</h1>

      <div class="controls">
        <button id="random-btn" class="btn">Randomize Ships</button>
        <button id="start-btn" class="btn">Start Game</button>
      </div>

      <div id="game-message" class="message">
        Click "Randomize Ships" then "Start Game"
      </div>

      <div class="boards-container">
        <div class="board-wrapper">
          <h2>Your Board</h2>
          <div class="board" id="human-board"></div>
        </div>

        <div class="board-wrapper">
          <h2>Computer Board</h2>
          <div class="board" id="computer-board"></div>
        </div>
      </div>
    </div>
  </body>
</html>
